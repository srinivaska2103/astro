<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <title>Launching Soon | Sunrise Astro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigoDark: '#1E1B4B',
                        sunOrange: '#F97316',
                        rosePink: '#FB7185',
                        warmYellow: '#FDE68A',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            transition: all 0.3s ease;
            /* Prevent scrolling on all devices */
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }
        .bg-pattern { background-image: radial-gradient(circle at 2px 2px, rgba(249, 115, 22, 0.05) 1px, transparent 0); background-size: 30px 30px; }
        
        /* Ensure the main container accounts for mobile browser bars */
        .h-screen-safe { height: 100dvh; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-indigoDark text-slate-900 dark:text-white bg-pattern flex flex-col h-screen-safe" 
      x-data="uiApp()" 
      x-init="init()"
      :dir="direction">

      <nav class="w-full p-6 flex justify-between items-center fixed top-0 z-50">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 bg-gradient-to-r from-sunOrange to-rosePink rounded-lg flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <i class="fas fa-sun text-white"></i>
            </div>
            <span class="text-xl font-extrabold uppercase tracking-tight hidden sm:block">
                Sunrise<span class="text-sunOrange">Astro</span>
            </span>
        </a>

        <div class="flex items-center gap-4">
            <button @click="toggleDir()" 
                    class="text-[10px] font-black px-3 py-1.5 border rounded-full border-slate-300 dark:border-white/20 hover:bg-sunOrange hover:text-white transition uppercase tracking-widest"
                    x-text="direction === 'ltr' ? 'RTL' : 'LTR'">
            </button>
            <button @click="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center shadow-sm text-slate-500 dark:text-warmYellow transition hover:scale-110">
                <i :class="darkMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-4 relative text-center overflow-hidden">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[250px] h-[250px] sm:w-[600px] sm:h-[600px] bg-sunOrange/10 blur-[80px] sm:blur-[120px] rounded-full -z-10 animate-pulse"></div>

        <div class="max-w-3xl w-full">
            <span class="inline-block px-3 py-1 mb-4 sm:mb-8 text-[10px] sm:text-xs font-black uppercase tracking-[0.2em] bg-sunOrange/10 text-sunOrange border border-sunOrange/20 rounded-full">
                Phase 1 Development
            </span>

            <h1 class="text-3xl sm:text-6xl lg:text-7xl font-extrabold leading-tight tracking-tighter mb-4 sm:mb-6 dark:text-white">
                The Future is <span class="text-transparent bg-clip-text bg-gradient-to-r from-sunOrange to-rosePink">Coming.</span>
            </h1>

            <p class="text-xs sm:text-xl text-slate-500 dark:text-slate-400 mb-8 sm:mb-12 max-w-xl mx-auto leading-relaxed font-medium">
                We are building an AI-powered astrology platform. Get notified when we go live.
            </p>

            <form class="max-w-md mx-auto flex flex-col sm:flex-row gap-2 sm:gap-3 mb-10 sm:mb-16">
                <input type="email" placeholder="Email address" required
                       class="flex-1 bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 px-5 py-3 sm:py-4 rounded-full focus:outline-none focus:border-sunOrange transition-all dark:text-white text-sm">
                <button type="submit" 
                        class="px-6 py-3 sm:py-4 bg-gradient-to-r from-sunOrange to-rosePink text-white rounded-full font-black text-[10px] sm:text-xs uppercase tracking-widest shadow-xl shadow-sunOrange/20 hover:shadow-sunOrange/40 hover:-translate-y-1 transition-all active:scale-95 whitespace-nowrap">
                    Notify Me
                </button>
            </form>

            <div class="flex items-center justify-center gap-6 sm:gap-8 text-slate-400">
                <a href="#" class="hover:text-sunOrange transition-all transform hover:-translate-y-1 text-xl sm:text-2xl"><i class="fab fa-instagram"></i></a>
                <a href="#" class="hover:text-sunOrange transition-all transform hover:-translate-y-1 text-xl sm:text-2xl"><i class="fab fa-x-twitter"></i></a>
                <a href="#" class="hover:text-sunOrange transition-all transform hover:-translate-y-1 text-xl sm:text-2xl"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="hover:text-sunOrange transition-all transform hover:-translate-y-1 text-xl sm:text-2xl"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </main>

    <footer class="p-4 sm:p-8 text-center shrink-0">
        <p class="text-[9px] sm:text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">
            &copy; 2026 Sunrise Astro • Coming Soon
        </p>
    </footer>

    <script>
        function uiApp() {
            return {
                darkMode: true,
                direction: 'ltr',

                init() {
                    this.darkMode = localStorage.getItem('theme') !== 'light';
                    this.applyTheme();
                    this.direction = localStorage.getItem('dir') || 'ltr';
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    this.applyTheme();
                },

                applyTheme() {
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                },

                toggleDir() {
                    this.direction = this.direction === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('dir', this.direction);
                }
            }
        }
    </script>
</body>
</html>
