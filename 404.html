<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <title>404 - Page Not Found | Sunrise Astro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigoDark: '#1E1B4B',
                        sunOrange: '#F97316',
                        rosePink: '#FB7185',
                        warmYellow: '#FDE68A',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .star-field { background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 40px 40px; }
    </style>
</head>
<body class="bg-white dark:bg-indigoDark text-slate-900 dark:text-white min-h-screen flex flex-col star-field overflow-hidden" 
      x-data="uiApp()" 
      x-init="init()"
      :dir="direction">

    <nav class="w-full p-6 flex justify-between items-center fixed top-0 z-50">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 bg-gradient-to-r from-sunOrange to-rosePink rounded-lg flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <i class="fas fa-sun text-white"></i>
            </div>
            <span class="text-xl font-extrabold uppercase tracking-tight hidden sm:block">
                Sunrise<span class="text-sunOrange">Astro</span>
            </span>
        </a>

        <div class="flex items-center gap-4">
            <button @click="toggleDir()" 
                    class="text-[10px] font-black px-3 py-1.5 border rounded-full border-slate-300 dark:border-white/20 hover:bg-sunOrange hover:text-white transition uppercase tracking-widest"
                    x-text="direction === 'ltr' ? 'RTL' : 'LTR'">
            </button>
            <button @click="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-100 dark:bg-white/10 flex items-center justify-center shadow-sm text-slate-500 dark:text-warmYellow transition hover:scale-110">
                <i :class="darkMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-4 relative">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] sm:w-[500px] sm:h-[500px] bg-sunOrange/10 blur-[100px] rounded-full -z-10 animate-pulse"></div>

        <div class="text-center max-w-2xl">
            <div class="relative inline-block mb-8">
                <h1 class="text-[100px] sm:text-[150px] lg:text-[200px] font-black leading-none tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-sunOrange to-rosePink/20 opacity-80">
                    404
                </h1>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 group">
                    <i class="fas fa-user-astronaut text-4xl sm:text-6xl text-white animate-bounce group-hover:rotate-45 transition-transform duration-700"></i>
                </div>
            </div>

            <h2 class="text-2xl sm:text-4xl font-extrabold mb-4 tracking-tight">You've Drifted Off Orbit</h2>
            <p class="text-sm sm:text-lg text-slate-500 dark:text-slate-400 mb-10 max-w-md mx-auto leading-relaxed">
                The cosmic path you're looking for doesn't exist. Perhaps it's hidden in another dimension?
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-gradient-to-r from-sunOrange to-rosePink text-white rounded-full font-black text-sm uppercase tracking-widest shadow-xl shadow-sunOrange/20 hover:shadow-sunOrange/40 hover:-translate-y-1 transition-all active:scale-95">
                    Return to Earth
                </a>
                <a href="contact.html" class="w-full sm:w-auto px-10 py-4 border-2 border-slate-200 dark:border-white/10 rounded-full font-black text-sm uppercase tracking-widest dark:text-white hover:bg-slate-100 dark:hover:bg-white/5 transition-all">
                    Report Issue
                </a>
            </div>
        </div>

        <div class="mt-20 flex gap-6 text-slate-400">
            <a href="#" class="hover:text-sunOrange transition text-xl"><i class="fab fa-instagram"></i></a>
            <a href="#" class="hover:text-sunOrange transition text-xl"><i class="fab fa-x-twitter"></i></a>
            <a href="#" class="hover:text-sunOrange transition text-xl"><i class="fab fa-discord"></i></a>
        </div>
    </main>

    <footer class="p-8 text-center">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">
            &copy; 2026 Sunrise Astro Platform
        </p>
    </footer>

    <script>
        function uiApp() {
            return {
                darkMode: true,
                direction: 'ltr',

                init() {
                    // Load Theme
                    this.darkMode = localStorage.getItem('theme') !== 'light';
                    this.applyTheme();
                    // Load Direction
                    this.direction = localStorage.getItem('dir') || 'ltr';
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    this.applyTheme();
                },

                applyTheme() {
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                },

                toggleDir() {
                    this.direction = this.direction === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('dir', this.direction);
                }
            }
        }
    </script>
</body>
</html>
