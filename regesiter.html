<!DOCTYPE html>
<html lang="en" dir="ltr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☀️</text></svg>">
    <title>Sign Up | Sunrise Astro Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        indigoDark: '#1E1B4B',
                        sunOrange: '#F97316',
                        rosePink: '#FB7185',
                        warmYellow: '#FDE68A',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .auth-card { backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input:checked + span { color: #F97316; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-indigoDark text-slate-900 dark:text-white min-h-screen flex flex-col" 
      x-data="authApp()" 
      x-init="init()"
      :dir="direction">

    <nav class="w-full p-6 flex justify-between items-center fixed top-0 z-50">
        <a href="index.html" class="flex items-center gap-3 group">
            <div class="w-10 h-10 bg-gradient-to-r from-sunOrange to-rosePink rounded-lg flex items-center justify-center shadow-lg group-hover:rotate-12 transition-transform">
                <i class="fas fa-sun text-white"></i>
            </div>
            <span class="text-xl font-extrabold uppercase tracking-tight hidden sm:block">
                Sunrise<span class="text-sunOrange">Astro</span>
            </span>
        </a>

        <div class="flex items-center gap-4">
            <button @click="toggleDir()" 
                    class="text-[10px] font-black px-3 py-1.5 border rounded-full border-slate-300 dark:border-white/20 hover:bg-sunOrange hover:text-white transition uppercase tracking-widest"
                    x-text="direction === 'ltr' ? 'RTL' : 'LTR'">
            </button>

            <button @click="toggleTheme()" class="w-10 h-10 rounded-full bg-white dark:bg-white/10 flex items-center justify-center shadow-sm text-slate-500 dark:text-warmYellow transition hover:scale-110">
                <i :class="darkMode ? 'fas fa-sun' : 'fas fa-moon'"></i>
            </button>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 pt-24 pb-12">
        <div class="w-full max-w-[420px] lg:max-w-[460px]">
            
            <div class="bg-white dark:bg-[#16193a]/80 auth-card p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 dark:border-white/5">
                
                <div class="text-center mb-8">
                    <h1 class="text-2xl md:text-3xl font-extrabold mb-2">Create Account</h1>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">Join thousands of seekers today</p>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-8">
                    <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-white/10 rounded-xl hover:bg-slate-50 dark:hover:bg-white/5 transition-all active:scale-95">
                        <i class="fab fa-google text-rosePink"></i>
                        <span class="text-xs font-bold uppercase tracking-tighter">Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-2 py-3 border border-slate-200 dark:border-white/10 rounded-xl hover:bg-slate-50 dark:hover:bg-white/5 transition-all active:scale-95">
                        <i class="fab fa-apple dark:text-white"></i>
                        <span class="text-xs font-bold uppercase tracking-tighter">Apple</span>
                    </button>
                </div>

                <div class="relative flex items-center mb-8">
                    <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
                    <span class="px-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">or register</span>
                    <div class="flex-grow border-t border-slate-200 dark:border-white/10"></div>
                </div>

                <form class="space-y-4" @submit.prevent="console.log('Sign up attempt')">
                    
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Full Name</label>
                        <input type="text" placeholder="Srinivas K A" required
                               class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 px-5 py-3.5 rounded-2xl focus:outline-none focus:border-sunOrange transition-all dark:text-white text-sm">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Email Address</label>
                        <input type="email" placeholder="name@company.com" required
                               class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 px-5 py-3.5 rounded-2xl focus:outline-none focus:border-sunOrange transition-all dark:text-white text-sm">
                    </div>

                    <div x-data="{ show: false }">
                        <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400 mb-2 ml-1">Password</label>
                        <div class="relative">
                            <input :type="show ? 'text' : 'password'" placeholder="Create a strong password" required
                                   class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 px-5 py-3.5 rounded-2xl focus:outline-none focus:border-sunOrange transition-all dark:text-white text-sm">
                            <button type="button" @click="show = !show" class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sunOrange transition">
                                <i class="fas" :class="show ? 'fa-eye-slash' : 'fa-eye'"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-start px-1 pt-2">
                        <label class="flex items-center gap-3 cursor-pointer group">
                            <div class="relative">
                                <input type="checkbox" required class="peer sr-only">
                                <div class="w-5 h-5 bg-slate-100 dark:bg-white/5 border border-slate-300 dark:border-white/10 rounded flex items-center justify-center peer-checked:bg-sunOrange peer-checked:border-sunOrange transition-all">
                                    <i class="fas fa-check text-white text-[10px]"></i>
                                </div>
                            </div>
                            <span class="text-[11px] leading-tight text-slate-500 dark:text-slate-400 group-hover:text-slate-700 dark:group-hover:text-slate-200 transition">
                                I agree to the <a href="#" class="text-sunOrange font-bold hover:underline">Terms of Service</a> and <a href="#" class="text-sunOrange font-bold hover:underline">Privacy Policy</a>.
                            </span>
                        </label>
                    </div>

                    <button class="w-full py-4 bg-gradient-to-r from-sunOrange to-rosePink text-white rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl shadow-sunOrange/20 hover:shadow-sunOrange/40 hover:-translate-y-0.5 transition-all active:scale-95 mt-4">
                        Create Free Account
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
                    Already have an account? 
                    <a href="login.html" class="font-bold text-sunOrange hover:underline underline-offset-4">Log in here</a>
                </p>
            </div>

            <div class="mt-8 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
                    &copy; 2026 Sunrise Astro Platform
                </p>
            </div>
        </div>
    </main>

    <script>
        function authApp() {
            return {
                darkMode: true,
                direction: 'ltr',

                init() {
                    // Persistent Theme
                    this.darkMode = localStorage.getItem('theme') !== 'light';
                    this.applyTheme();

                    // Persistent Direction
                    this.direction = localStorage.getItem('dir') || 'ltr';
                },

                toggleTheme() {
                    this.darkMode = !this.darkMode;
                    localStorage.setItem('theme', this.darkMode ? 'dark' : 'light');
                    this.applyTheme();
                },

                applyTheme() {
                    if (this.darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                },

                toggleDir() {
                    this.direction = this.direction === 'ltr' ? 'rtl' : 'ltr';
                    localStorage.setItem('dir', this.direction);
                }
            }
        }
    </script>
</body>
</html>
